<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
</head>
<body>
    <script>
        (function () {
            var path = window.location.pathname.replace(/^\/+/, "");
            var targetPage = path || "login";
            window.location.replace("/#" + targetPage);
        })();
    </script>
</body>
</html>
